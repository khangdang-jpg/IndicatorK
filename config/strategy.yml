  bear_proxy_ret_60: -0.10
  bear_breadth_20: 0.30
  bear_breadth_50: 0.30
  bear_proxy_ret_20_cap: 0.03
  sideway_proxy_ret_20_abs: 0.03
  sideway_proxy_ret_60_abs: 0.06
  sideway_breadth_20_min: 0.35
  sideway_breadth_20_max: 0.75
  bull_hysteresis_proxy_ret_20: -0.03
  bear_hysteresis_proxy_ret_60: -0.03
  bear_hysteresis_breadth_50: 0.45
  bear_max_new_positions: 0
  sideway_max_new_positions: 6
  bull_max_new_positions: 4
  bull_transition_max_new_positions: 5
  strong_bull_proxy_ret_20: 0.05
  strong_bull_breadth_20: 0.70
  strong_bull_breadth_50: 0.65
  bull_caution_proxy_ret_20_max: 0.015
  bull_caution_breadth_20_max: 0.25
  bull_caution_breadth_50_max: 0.75
  bull_caution_max_new_positions: 1
  bull_caution_ret_lookback: 5
  bull_caution_ma_short: 10
  bull_caution_ma_long: 20
  bull_allow_add_ons: false
  bull_max_open_trades_per_symbol: 1
  bull_max_symbols_per_sector: 99
  bull_add_on_size_scale: 0.20
  bull_add_on_min_conviction: 0.85
  bull_low_vol_threshold: 0.020
  bull_high_vol_threshold: 0.035
  bull_low_vol_stock_target: 1.00
  bull_high_vol_stock_target: 0.88
  bull_max_deployment_scale: 2.40
  bull_position_target_cap: 0.45

  bull_momentum_rsi_min: 46
  bull_momentum_atr_stop: 1.6
  bull_momentum_stop_floor_pct: 0.92
  bull_volume_surge_threshold: 1.1
  bull_kelly_fraction: 0.60
  bull_momentum_atr_target: 6.0
  bull_breakout_min_conviction: 1.50
  bull_breakout_volume_relax: 1.50
  sideway_rsi_oversold: 30
  sideway_atr_target: 3.0
  sideway_bb_std_mult: 1.6
  sideway_kelly_fraction: 0.4

  sideway_low_vol_threshold: 0.012
  sideway_high_vol_threshold: 0.024
  sideway_low_vol_stock_target: 0.84
  sideway_high_vol_stock_target: 0.66
  sideway_max_deployment_scale: 1.30
  sideway_position_target_cap: 0.18

dual_stream_combined:
  # Signal weighting (new)
  weekly_weight: 0.60
  intraweek_weight: 0.40
  max_combined_position: 0.25

  # INHERIT: All weekly strategy parameters
  weekly:
    ma_short: 10
    ma_long: 30
    rsi_period: 14
    atr_period: 14
    regime_lookback: 60
    trend_threshold: 0.05
    # Bear market parameters - FIXED: More realistic targets
    bear_rsi_threshold: 70
    bear_position_multiplier: 0.6
    bear_atr_stop_mult: 1.2
    bear_atr_target_mult: 1.3  # FIXED: Realistic 15-20% targets (was 2.0)
    bear_use_breakout_entry: true  # Use breakout entry in bear markets
    # Bull market parameters
    bull_rsi_threshold: 45
    bull_position_multiplier: 1.5
    bull_atr_stop_mult: 1.8
    bull_atr_target_mult: 4.0
    # Sideways parameters
    sideways_rsi_threshold: 55
    sideways_position_multiplier: 1.0
    sideways_atr_stop_mult: 1.5
    sideways_atr_target_mult: 2.5
    # ATH capping
    ath_cap_pct: 0.20
    ath_lookback_days: 252

  # INHERIT: All enhanced intraweek strategy parameters
  intraweek:
    # Technical parameters
    ma_short: 8
    ma_long: 25
    rsi_period: 12
    atr_period: 12
    adx_period: 12
    bb_period: 18
    bb_std_mult: 1.8
    entry_buffer_pct: 0.0015
    # Enhanced regime detection
    regime_lookback: 45
    trend_threshold: 0.025
    volatility_threshold: 0.35
    adx_trending_threshold: 18
    # Enhanced momentum parameters
    momentum_rsi_min: 52
    momentum_atr_stop: 1.6
    momentum_atr_target: 5.2
    momentum_position_mult: 1.8
    # Mean reversion parameters
    mean_revert_rsi_oversold: 25
    mean_revert_rsi_overbought: 75
    mean_revert_atr_stop: 1.0
    mean_revert_atr_target: 2.5
    mean_revert_position_mult: 1.0
    # Bear market parameters - FIXED: More realistic targets
    bear_rsi_threshold: 72      # Even more selective for intraweek
    bear_position_mult: 0.5     # Very defensive for intraweek bear
    bear_atr_stop: 0.8          # Keep tight stops
    bear_atr_target: 1.5        # FIXED: Conservative targets (was 3.0)
    # Institutional features
    use_kelly_sizing: true
    kelly_fraction: 0.35
    conviction_multiplier: true
    use_sector_rotation: true
    correlation_lookback: 30
    sector_strength_lookback: 20
    efficiency_lookback: 15
    volume_surge_threshold: 2.0
    liquidity_threshold: 1.5
    # Duration modeling
    momentum_hold_target: 8
    mean_revert_hold_target: 4
    # ATH capping
    ath_cap_pct: 0.12
    ath_lookback_days: 90

rebalance_50_50:
  stock_target: 0.50
  bond_fund_target: 0.50
  drift_threshold: 0.05  # Rebalance when drift exceeds 5%
